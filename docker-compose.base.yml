# Shared services: the echo app and its reverse proxy.
# Each stack's docker-compose.yml extends this via `include`.
# Stack-specific env vars (OTEL endpoint, feature flags) belong in the stack compose.

services:
  echo:
    build:
      context: ./service
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY
        - HTTPS_PROXY
        - NO_PROXY=localhost,127.0.0.1
    environment:
      ADDR: ":8080"
      LOG_FORMAT: "json"
      LOG_LEVEL: "info"
      SERVICE_NAME: "echo"
      DB_PATH: "/data/notes.db"
    volumes:
      - echo-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2.11.1-alpine
    ports:
      - "80:80"
    volumes:
      - ./service/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - echo
    restart: unless-stopped

volumes:
  echo-data:
