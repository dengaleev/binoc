<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>binoc</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 480px; width: 100%; padding: 2rem; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: .25rem; }
  p { color: #8b949e; font-size: .875rem; margin-bottom: 2rem; }
  nav { display: flex; flex-direction: column; gap: .5rem; }
  a { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; border-radius: 8px; background: #161b22; border: 1px solid #30363d; color: #e1e4e8; text-decoration: none; font-size: .875rem; transition: border-color .15s; }
  a:hover { border-color: #58a6ff; }
  .label { font-weight: 500; }
  .port { color: #8b949e; font-size: .75rem; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<div class="container">
  <h1>binoc</h1>
  <p>observability playground</p>
  <nav>
    <a href="/echo?msg=hello"><span class="label">Echo Service</span><span class="port">:80/echo</span></a>
    <a href="http://localhost:3000"><span class="label">Grafana</span><span class="port">:3000</span></a>
    <a href="http://localhost:9090"><span class="label">Prometheus</span><span class="port">:9090</span></a>
    <a href="http://localhost:3100/ready"><span class="label">Loki</span><span class="port">:3100</span></a>
    <a href="http://localhost:3200/status"><span class="label">Tempo</span><span class="port">:3200</span></a>
  </nav>
</div>
</body>
</html>
